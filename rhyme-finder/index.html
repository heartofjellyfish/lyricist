<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhyme Finder · 韵</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Ma+Shan+Zheng&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="rf-marginalia" aria-hidden="true"></div>

    <main class="rf-app">
      <header class="rf-hero">
        <div class="rf-title-row">
          <!-- Shanshui painting paired with the wordmark — the red sail and the
               韵 seal each provide one vermilion accent that mirrors across
               the title. Inline SVG so it scales crisp and inherits ink color. -->
          <svg class="rf-mg rf-mg-shanshui" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <!-- Distant range -->
            <path d="M0 92 C 30 70, 56 82, 88 64 C 118 48, 146 70, 178 56 C 210 42, 240 64, 272 48 C 296 36, 312 50, 320 44"
                  fill="none" stroke="#1a140e" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.32"/>
            <!-- Middle range -->
            <path d="M0 124 C 22 108, 48 118, 76 102 C 102 88, 132 110, 164 96 C 196 82, 224 104, 256 92 C 282 82, 304 96, 320 88"
                  fill="none" stroke="#1a140e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
            <!-- Front range -->
            <path d="M0 156 C 18 142, 40 154, 64 138 C 88 122, 116 144, 142 134 C 168 124, 196 142, 224 130 C 250 118, 274 134, 298 124 C 312 118, 318 122, 320 120"
                  fill="none" stroke="#1a140e" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
            <!-- Pine silhouettes -->
            <g fill="#1a140e" opacity="0.7">
              <path d="M62 138 L 64 128 L 66 138 Z"/>
              <path d="M138 134 L 140 124 L 142 134 Z"/>
              <path d="M222 130 L 224 121 L 226 130 Z"/>
            </g>
            <!-- Boat with red sail -->
            <g opacity="0.85">
              <path d="M22 178 C 30 176, 46 176, 54 178" fill="none" stroke="#1a140e" stroke-width="1.2" stroke-linecap="round"/>
              <path d="M26 178 L 50 178" fill="none" stroke="#1a140e" stroke-width="0.7" stroke-linecap="round"/>
              <line x1="38" y1="178" x2="38" y2="166" stroke="#1a140e" stroke-width="0.9" stroke-linecap="round"/>
              <path d="M38 167 C 44 167, 49 170, 50 176 C 47 175, 42 175, 38 176 Z" fill="#b13b2c" opacity="0.92"/>
              <path d="M38 167 C 44 167, 49 170, 50 176" fill="none" stroke="#8a2a1e" stroke-width="0.45" stroke-linecap="round" opacity="0.7"/>
            </g>
            <!-- Water strokes -->
            <g stroke="#1a140e" fill="none" stroke-linecap="round" opacity="0.32">
              <path d="M174 184 L 220 184" stroke-width="0.7"/>
              <path d="M236 188 L 282 188" stroke-width="0.6"/>
            </g>
          </svg>
          <h1 class="rf-title">
            Rhyme Finder<span class="rf-seal" aria-hidden="true"><span class="rf-seal-glyph">韵</span></span>
          </h1>
        </div>
      </header>

      <section class="rf-panel">
        <form id="finder-form" class="rf-form">
          <div class="rf-input-row">
            <input
              id="word-input"
              name="word"
              type="text"
              placeholder="give me an english word"
              autocomplete="off"
              spellcheck="false"
              autofocus
            />
            <button type="submit" class="rf-go-btn" aria-label="Find rhymes">
              <span class="rf-go-btn-arrow" aria-hidden="true">→</span>
            </button>
          </div>
        </form>
        <div id="status" class="rf-status" data-state="ready"></div>
      </section>

      <section class="rf-results-shell">
        <div id="source-summary" class="rf-source-summary"></div>
        <div id="results" class="rf-results"></div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
