<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhyme Finder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="rf-app">
      <header class="rf-hero">
        <h1>Rhyme Finder</h1>
        <p class="rf-nav">
          <a href="../">Home</a> ·
          <a href="../line-craft/">Line Craft</a> ·
          <a href="../stress-workshop/">Stress Workshop</a>
        </p>
      </header>

      <section class="rf-panel">
        <form id="finder-form" class="rf-form">
          <div class="rf-input-row">
            <input
              id="word-input"
              name="word"
              type="text"
              placeholder="Type a word…"
              autocomplete="off"
              spellcheck="false"
              autofocus
            />
            <button type="submit" class="rf-go-btn">Find Rhymes</button>
          </div>
        </form>
        <div id="status" class="rf-status" data-state="ready"></div>
      </section>

      <section class="rf-results-shell">
        <div id="source-summary" class="rf-source-summary"></div>
        <div id="results" class="rf-results"></div>
      </section>

    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
